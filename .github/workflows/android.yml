name: Build NewPipeExtractor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build
        run: ./gradlew jar

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: NewPipeExtractor-JAR
          path: "**/build/libs/*.jar"
